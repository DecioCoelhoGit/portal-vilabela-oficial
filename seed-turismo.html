<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seed Turismo • Vila Bela MT</title>
<style>
body{font-family:Arial,sans-serif;background:#eef7f2;padding:30px;max-width:800px;margin:auto}
.card{background:#fff;padding:25px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#00695c;color:#fff;font-size:18px;font-weight:bold;cursor:pointer}
button:hover{opacity:.95}
#log{margin-top:15px;white-space:pre-line;color:#333}
small{color:#666}
</style>
</head>
<body>

<div class="card">
<h1>Seed Turismo</h1>
<p>Carrega automaticamente registros de teste na coleção <b>turismo</b>.</p>
<button onclick="executarSeed()">Inserir Massa de Teste</button>
<div id="log"></div>
<small>Use uma vez. Se clicar novamente, duplicará os dados.</small>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBbGWBKp_LlO546yM-2IXIAuvHnK9q1mlI",
authDomain: "portal-vilabela-oficial.firebaseapp.com",
projectId: "portal-vilabela-oficial",
storageBucket: "portal-vilabela-oficial.firebasestorage.app",
messagingSenderId: "908975101824",
appId: "1:908975101824:web:f986598784403493721365"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dados = [
{nome:"Família Souza",origem:"Cuiabá MT",qtd:4,atrativo:"City Tour Histórico",dataVisita:"2026-05-02",guia:"Décio Coelho",obs:"Pacote família"},
{nome:"Grupo Trilheiros",origem:"Rondonópolis MT",qtd:12,atrativo:"Cânion do Jatobá",dataVisita:"2026-05-03",guia:"Ederson Coelho",obs:"Trilha guiada"},
{nome:"Turistas SP",origem:"São Paulo SP",qtd:6,atrativo:"Cascata dos Namorados",dataVisita:"2026-05-05",guia:"Mizael Leite",obs:"Passeio ecológico"},
{nome:"Excursão Escolar",origem:"Cáceres MT",qtd:28,atrativo:"City Tour Histórico",dataVisita:"2026-05-06",guia:"Jamiro",obs:"Aula externa"},
{nome:"Casal Visitante",origem:"Brasília DF",qtd:2,atrativo:"Cachoeira do Viracopos",dataVisita:"2026-05-07",guia:"Vanilson",obs:"Lua de mel"},
{nome:"Grupo Empresarial",origem:"Campo Grande MS",qtd:10,atrativo:"Cânion do Capivary",dataVisita:"2026-05-08",guia:"Décio Coelho",obs:"Turismo corporativo"},
{nome:"Festival Regional",origem:"Vila Bela MT",qtd:50,atrativo:"Evento Turístico",dataVisita:"2026-05-10",guia:"Equipe Oficial",obs:"Evento municipal"}
];

window.executarSeed = async function(){
const log = document.getElementById("log");
log.innerText = "Iniciando...\n";
let total = 0;

for(const item of dados){
await addDoc(collection(db,"turismo"),{
...item,
data: serverTimestamp()
});
total++;
log.innerText += "✔ Registro inserido: " + item.nome + "\n";
}

log.innerText += "\n✅ Seed concluída. Total: " + total + " registros.";
}
</script>

</body>
</html>
