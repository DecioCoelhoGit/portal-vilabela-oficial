<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Transparência Real • Vila Bela MT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#eef2f7;color:#222}
header{
background:#1b5e20;color:#fff;
padding:18px;text-align:center;
font-size:26px;font-weight:bold
}
.container{max-width:1200px;margin:auto;padding:20px}
.card{
background:#fff;padding:20px;border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:20px
}
input,select,textarea,button{
width:100%;padding:12px;margin:8px 0;
border:1px solid #ccc;border-radius:8px;font-size:16px
}
button{
background:#1b5e20;color:#fff;border:none;
font-weight:bold;cursor:pointer
}
button:hover{opacity:.92}
.grid{display:grid;gap:15px}
.item{
border:1px solid #ddd;border-radius:10px;
padding:15px;background:#fafafa
}
.hidden{display:none}
.small{font-size:13px;color:#666}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header>Transparência Real • Portal Prefeitura Vila Bela MT</header>

<div class="container">

<div class="card" id="loginBox">
<h2>Acesso Administrativo</h2>
<p class="small">Entrar com Google</p>
<button onclick="loginGoogle()">Entrar com Google</button>
<div id="msg"></div>
</div>

<div id="painel" class="hidden">

<div class="card">
<h2>Lançar Receita / Despesa</h2>

<select id="tipo">
<option>Receita</option>
<option>Despesa</option>
<option>Licitação</option>
<option>Convênio</option>
</select>

<input id="titulo" placeholder="Título / Descrição">
<input id="valor" type="number" step="0.01" placeholder="Valor (R$)">
<input id="setor" placeholder="Secretaria / Setor">
<input id="dataRef" type="date">
<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="salvar()">Salvar Registro</button>
<div id="status"></div>
</div>

<div class="card">
<h2>Registros Publicados</h2>
<div id="lista" class="grid"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBbGWBKp_LlO546yM-2IXIAuvHnK9q1mlI",
authDomain: "portal-vilabela-oficial.firebaseapp.com",
projectId: "portal-vilabela-oficial",
storageBucket: "portal-vilabela-oficial.firebasestorage.app",
messagingSenderId: "908975101824",
appId: "1:908975101824:web:f986598784403493721365"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.loginGoogle = async function(){
try{
await signInWithPopup(auth,new GoogleAuthProvider());
loginBox.classList.add("hidden");
painel.classList.remove("hidden");
carregar();
}catch(e){
msg.innerText=e.message;
}
}

window.salvar = async function(){
try{
await addDoc(collection(db,"transparencia"),{
tipo:tipo.value,
titulo:titulo.value,
valor:Number(valor.value||0),
setor:setor.value,
dataRef:dataRef.value,
obs:obs.value,
data:serverTimestamp()
});
status.innerText="Registro salvo com sucesso!";
titulo.value="";valor.value="";setor.value="";
dataRef.value="";obs.value="";
carregar();
}catch(e){
status.innerText=e.message;
}
}

async function carregar(){
const snap = await getDocs(collection(db,"transparencia"));
lista.innerHTML="";

snap.forEach(x=>{
const d=x.data();

lista.innerHTML += `
<div class="item">
<strong>${d.tipo}</strong><br><br>
${d.titulo}<br>
Valor: R$ ${Number(d.valor||0).toFixed(2)}<br>
Setor: ${d.setor}<br>
Data: ${d.dataRef}<br><br>
${d.obs || ""}
<br><br>
<button onclick="apagar('${x.id}')">Excluir</button>
</div>`;
});
}

window.apagar = async function(id){
await deleteDoc(doc(db,"transparencia",id));
carregar();
}
</script>

</body>
</html>
