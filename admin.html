<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin • Portal Prefeitura Vila Bela MT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="font-a">

<header>
  <img src="imagens/vilabela-brasao-web-1.jpg" alt="Brasão Vila Bela">
  <div>
    <h1>Painel Administrativo</h1>
    <p>Portal Prefeitura Vila Bela MT</p>
  </div>
</header>

<nav class="menu">
  <a href="index.html">Início</a>
  <a href="noticias.html">Notícias</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="main-gabinete.html">Gabinete</a>
</nav>

<main>

  <section class="card" id="loginBox">
    <h2>Acesso Administrativo</h2>
    <p>Entre com sua conta Google para publicar notícias.</p>
    <button onclick="loginGoogle()">Entrar com Google</button>
    <p id="loginMsg"></p>
  </section>

  <section id="painelAdmin" style="display:none;">

    <section class="card">
      <h2>Publicar notícia com imagem</h2>

      <input class="campo" id="titulo" placeholder="Título da notícia">

      <br><br>

      <textarea class="campo-area" id="texto" placeholder="Conteúdo da notícia"></textarea>

      <br><br>

      <input class="campo" id="imagemUrl" placeholder="URL da imagem externa opcional">

      <br><br>

      <label><strong>Ou envie uma imagem do celular:</strong></label>
      <input class="campo" id="imagemArquivo" type="file" accept="image/*">

      <br><br>

      <button onclick="publicarNoticia()">Publicar Notícia</button>
      <button class="secundario" onclick="logout()">Sair</button>

      <p id="statusPublicacao"></p>
    </section>

    <section class="card">
      <h2>Notícias Publicadas</h2>
      <div id="listaNoticias">Carregando...</div>
    </section>

    <section class="card">
      <h2>Mensagens Recebidas</h2>
      <div id="listaContatos">Carregando...</div>
    </section>

  </section>

</main>

<button class="acessibilidade-btn" onclick="toggleAcessibilidade()">♿</button>

<div class="acessibilidade-panel" id="painelAcessibilidade">
  <button onclick="setFonte('a')">A normal</button>
  <button onclick="setFonte('a-plus')">A+</button>
  <button onclick="setFonte('a-plus-plus')">A++</button>
  <button onclick="setTema('claro')">☀ Claro</button>
  <button onclick="setTema('escuro')">🌙 Escuro</button>
  <button onclick="setTema('contraste')">⚫ Contraste</button>
</div>

<script>
function toggleAcessibilidade(){
  const p = document.getElementById("painelAcessibilidade");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function setFonte(tipo){
  document.body.classList.remove("font-a","font-a-plus","font-a-plus-plus");
  if(tipo==="a") document.body.classList.add("font-a");
  if(tipo==="a-plus") document.body.classList.add("font-a-plus");
  if(tipo==="a-plus-plus") document.body.classList.add("font-a-plus-plus");
  localStorage.setItem("fonte", tipo);
}

function setTema(tipo){
  document.body.classList.remove("tema-claro","alto-contraste");
  if(tipo==="claro") document.body.classList.add("tema-claro");
  if(tipo==="contraste") document.body.classList.add("alto-contraste");
  localStorage.setItem("tema", tipo);
}

(function restore(){
  const f = localStorage.getItem("fonte");
  const t = localStorage.getItem("tema");
  if(f) setFonte(f);
  if(t) setTema(t);
})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signInWithRedirect,
  getRedirectResult,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbGWBKp_LlO546yM-2IXIAuvHnK9q1mlI",
  authDomain: "portal-vilabela-oficial.firebaseapp.com",
  projectId: "portal-vilabela-oficial",
  storageBucket: "portal-vilabela-oficial.firebasestorage.app",
  messagingSenderId: "908975101824",
  appId: "1:908975101824:web:f986598784403493721365"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

function isMobile(){
  return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(navigator.userAgent);
}

window.loginGoogle = async function(){
  const msg = document.getElementById("loginMsg");
  msg.innerText = "";

  try {
    if(isMobile()){
      await signInWithRedirect(auth, provider);
    } else {
      await signInWithPopup(auth, provider);
    }
  } catch(e){
    msg.innerText = "Erro: " + e.message;
  }
};

await getRedirectResult(auth).catch(e => {
  document.getElementById("loginMsg").innerText = "Erro: " + e.message;
});

onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painelAdmin").style.display = "block";
    carregarNoticias();
    carregarContatos();
  }
});

window.logout = async function(){
  await signOut(auth);
  location.reload();
};

async function uploadImagem(){
  const arquivo = document.getElementById("imagemArquivo").files[0];

  if(!arquivo) return "";

  const nomeSeguro = Date.now() + "-" + arquivo.name.replace(/\s+/g, "-").toLowerCase();
  const caminho = "noticias/" + nomeSeguro;

  const storageRef = ref(storage, caminho);
  await uploadBytes(storageRef, arquivo);

  return await getDownloadURL(storageRef);
}

window.publicarNoticia = async function(){
  const titulo = document.getElementById("titulo").value.trim();
  const texto = document.getElementById("texto").value.trim();
  const imagemUrl = document.getElementById("imagemUrl").value.trim();
  const status = document.getElementById("statusPublicacao");

  if(!titulo || !texto){
    status.innerText = "Preencha título e conteúdo.";
    return;
  }

  status.innerText = "Publicando...";

  try {
    let imagemFinal = imagemUrl;

    const arquivo = document.getElementById("imagemArquivo").files[0];
    if(arquivo){
      status.innerText = "Enviando imagem...";
      imagemFinal = await uploadImagem();
    }

    if(!imagemFinal){
      imagemFinal = "imagens/portal-og-1.jpg";
    }

    await addDoc(collection(db, "noticias"), {
      titulo,
      texto,
      imagem: imagemFinal,
      data: serverTimestamp()
    });

    document.getElementById("titulo").value = "";
    document.getElementById("texto").value = "";
    document.getElementById("imagemUrl").value = "";
    document.getElementById("imagemArquivo").value = "";

    status.innerText = "Notícia publicada com sucesso!";
    carregarNoticias();

  } catch(e){
    status.innerText = "Erro: " + e.message;
  }
};

async function carregarNoticias(){
  const lista = document.getElementById("listaNoticias");

  try {
    const q = query(collection(db, "noticias"), orderBy("data", "desc"));
    const snap = await getDocs(q);

    if(snap.empty){
      lista.innerHTML = "<p>Nenhuma notícia publicada.</p>";
      return;
    }

    lista.innerHTML = "";

    snap.forEach(item => {
      const n = item.data();
      const imagem = n.imagem || "imagens/portal-og-1.jpg";
      const data = n.data?.toDate ? n.data.toDate().toLocaleDateString("pt-BR") : "";

      lista.innerHTML += `
        <article class="noticia card">
          <img src="${imagem}" alt="${n.titulo || 'Notícia'}">
          <h3>${n.titulo || "Sem título"}</h3>
          <small>${data}</small>
          <p>${n.texto || ""}</p>
          <br>
          <button class="secundario" onclick="excluirNoticia('${item.id}')">Excluir</button>
        </article>
      `;
    });

  } catch(e){
    lista.innerHTML = "<p>Erro ao carregar notícias: " + e.message + "</p>";
  }
}

window.excluirNoticia = async function(id){
  if(!confirm("Deseja excluir esta notícia?")) return;

  await deleteDoc(doc(db, "noticias", id));
  carregarNoticias();
};

async function carregarContatos(){
  const lista = document.getElementById("listaContatos");

  try {
    const snap = await getDocs(collection(db, "contatos"));

    if(snap.empty){
      lista.innerHTML = "<p>Nenhuma mensagem recebida.</p>";
      return;
    }

    lista.innerHTML = "";

    snap.forEach(item => {
      const c = item.data();

      lista.innerHTML += `
        <div class="card">
          <h3>${c.nome || "Sem nome"}</h3>
          <p><strong>Email:</strong> ${c.email || ""}</p>
          <p>${c.mensagem || ""}</p>

          <select class="campo" id="status_${item.id}">
            <option value="novo" ${c.status === "novo" ? "selected" : ""}>novo</option>
            <option value="em análise" ${c.status === "em análise" ? "selected" : ""}>em análise</option>
            <option value="resolvido" ${c.status === "resolvido" ? "selected" : ""}>resolvido</option>
          </select>

          <br><br>

          <button onclick="salvarContato('${item.id}')">Salvar</button>
          <button class="secundario" onclick="excluirContato('${item.id}')">Excluir</button>
        </div>
      `;
    });

  } catch(e){
    lista.innerHTML = "<p>Erro ao carregar contatos: " + e.message + "</p>";
  }
}

window.salvarContato = async function(id){
  const valor = document.getElementById("status_" + id).value;
  await updateDoc(doc(db, "contatos", id), { status: valor });
  carregarContatos();
};

window.excluirContato = async function(id){
  if(!confirm("Deseja excluir esta mensagem?")) return;
  await deleteDoc(doc(db, "contatos", id));
  carregarContatos();
};
</script>

</body>
</html>
