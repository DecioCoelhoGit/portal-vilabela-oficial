<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Admin • Notícias + Contatos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#eef2f7;color:#222}
header{background:#0d47a1;color:#fff;padding:18px;text-align:center;font-size:24px;font-weight:bold}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:20px}
input,textarea,button,select{
width:100%;padding:12px;margin:8px 0;
border:1px solid #ccc;border-radius:8px;font-size:16px
}
button{background:#0d47a1;color:#fff;border:none;font-weight:bold;cursor:pointer}
button:hover{background:#1565c0}
.grid{display:grid;gap:15px}
.item{border:1px solid #ddd;border-radius:10px;padding:15px;background:#fafafa}
.hidden{display:none}
.small{font-size:13px;color:#666}
.badge{padding:5px 10px;border-radius:20px;color:#fff;font-size:12px}
.novo{background:#2e7d32}.analise{background:#ef6c00}.resolvido{background:#1565c0}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header>Painel Admin • Portal Prefeitura Vila Bela MT</header>

<div class="container">

<div class="card" id="loginBox">
<h2>Acesso Administrativo</h2>
<p class="small">Entrar com conta Google autorizada</p>
<button onclick="loginGoogle()">Entrar com Google</button>
<div id="msg"></div>
</div>

<div id="painel" class="hidden">

<div class="card">
<h2>Publicar Notícia</h2>
<input id="titulo" placeholder="Título da notícia">
<textarea id="texto" placeholder="Conteúdo da notícia"></textarea>
<button onclick="publicarNoticia()">Publicar Notícia</button>
<div id="nmsg"></div>
</div>

<div class="card">
<h2>Notícias Publicadas</h2>
<div id="listaNoticias" class="grid"></div>
</div>

<div class="card">
<h2>Mensagens Recebidas</h2>
<div id="listaContatos" class="grid"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBbGWBKp_LlO546yM-2IXIAuvHnK9q1mlI",
authDomain: "portal-vilabela-oficial.firebaseapp.com",
projectId: "portal-vilabela-oficial",
storageBucket: "portal-vilabela-oficial.firebasestorage.app",
messagingSenderId: "908975101824",
appId: "1:908975101824:web:f986598784403493721365"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.loginGoogle = async function(){
try{
await signInWithPopup(auth,new GoogleAuthProvider());
loginBox.classList.add("hidden");
painel.classList.remove("hidden");
carregarNoticias();
carregarContatos();
}catch(e){
msg.innerText="Erro: "+e.message;
}
}

window.publicarNoticia = async function(){
try{
await addDoc(collection(db,"noticias"),{
titulo:titulo.value,
texto:texto.value,
data:serverTimestamp()
});
nmsg.innerText="Notícia publicada!";
titulo.value=""; texto.value="";
carregarNoticias();
}catch(e){
nmsg.innerText=e.message;
}
}

async function carregarNoticias(){
const snap = await getDocs(collection(db,"noticias"));
listaNoticias.innerHTML="";
snap.forEach(x=>{
const d=x.data();
listaNoticias.innerHTML += `
<div class="item">
<strong>${d.titulo}</strong><br><br>
${d.texto}<br><br>
<button onclick="apagarNoticia('${x.id}')">Excluir</button>
</div>`;
});
}

window.apagarNoticia = async function(id){
await deleteDoc(doc(db,"noticias",id));
carregarNoticias();
}

async function carregarContatos(){
const snap = await getDocs(collection(db,"contatos"));
listaContatos.innerHTML="";
snap.forEach(x=>{
const d=x.data(), id=x.id;
const st=d.status||"novo";
listaContatos.innerHTML += `
<div class="item">
<strong>${d.nome}</strong><br>
<span class="small">${d.email}</span><br><br>
${d.mensagem}<br><br>

<select id="s_${id}">
<option ${st==="novo"?"selected":""}>novo</option>
<option ${st==="em análise"?"selected":""}>em análise</option>
<option ${st==="resolvido"?"selected":""}>resolvido</option>
</select>

<button onclick="salvarContato('${id}')">Salvar</button>
<button onclick="apagarContato('${id}')">Excluir</button>
</div>`;
});
}

window.salvarContato = async function(id){
const v=document.getElementById("s_"+id).value;
await updateDoc(doc(db,"contatos",id),{status:v});
carregarContatos();
}

window.apagarContato = async function(id){
await deleteDoc(doc(db,"contatos",id));
carregarContatos();
}
</script>

</body>
</html>
