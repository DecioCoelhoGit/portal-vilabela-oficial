<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Admin Google • Vila Bela MT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;color:#222}
header{background:#0d47a1;color:#fff;padding:18px;text-align:center;font-size:24px;font-weight:bold}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:20px}
button,select{
width:100%;padding:12px;margin:8px 0;
border:1px solid #ccc;border-radius:8px;font-size:16px
}
button{background:#0d47a1;color:#fff;border:none;font-weight:bold}
.grid{display:grid;gap:15px}
.item{border:1px solid #ddd;border-radius:10px;padding:15px;background:#fafafa}
.hidden{display:none}
.badge{padding:5px 10px;border-radius:20px;color:#fff;font-size:12px}
.novo{background:#2e7d32}.analise{background:#ef6c00}.resolvido{background:#1565c0}
.small{font-size:13px;color:#666}
</style>
</head>
<body>

<header>Painel Admin Google • Portal Prefeitura Vila Bela MT</header>

<div class="container">

<div class="card" id="loginBox">
<h2>Acesso Administrativo</h2>
<p class="small">Entrar com conta Google autorizada</p>
<button onclick="loginGoogle()">Entrar com Google</button>
<div id="msg"></div>
</div>

<div id="painel" class="hidden">
<div class="card">
<h2>Mensagens Recebidas</h2>
<button onclick="logout()">Sair</button>
</div>
<div id="lista" class="grid"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, doc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, GoogleAuthProvider, signInWithPopup, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBbGWBKp_LlO546yM-2IXIAuvHnK9q1mlI",
authDomain: "portal-vilabela-oficial.firebaseapp.com",
projectId: "portal-vilabela-oficial",
storageBucket: "portal-vilabela-oficial.firebasestorage.app",
messagingSenderId: "908975101824",
appId: "1:908975101824:web:f986598784403493721365"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.loginGoogle = async function(){
try{
await signInWithPopup(auth,new GoogleAuthProvider());
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("painel").classList.remove("hidden");
carregar();
}catch(err){
document.getElementById("msg").innerText="Erro: "+err.message;
}
}

window.logout = async function(){
await signOut(auth);
location.reload();
}

async function carregar(){
const snap = await getDocs(collection(db,"contatos"));
const lista = document.getElementById("lista");
lista.innerHTML="";

snap.forEach((x)=>{
const d=x.data(), id=x.id;
const st=d.status||"novo";
let cls="novo";
if(st==="em análise") cls="analise";
if(st==="resolvido") cls="resolvido";

lista.innerHTML += `
<div class="item">
<strong>${d.nome}</strong><br>
<span class="small">${d.email}</span><br><br>
${d.mensagem}<br><br>

<span class="badge ${cls}">${st}</span>

<select id="s_${id}">
<option ${st==="novo"?"selected":""}>novo</option>
<option ${st==="em análise"?"selected":""}>em análise</option>
<option ${st==="resolvido"?"selected":""}>resolvido</option>
</select>

<button onclick="salvar('${id}')">Salvar</button>
<button onclick="apagar('${id}')" style="background:#c62828">Excluir</button>
</div>`;
});
}

window.salvar = async function(id){
const v=document.getElementById("s_"+id).value;
await updateDoc(doc(db,"contatos",id),{status:v});
carregar();
}

window.apagar = async function(id){
if(confirm("Excluir mensagem?")){
await deleteDoc(doc(db,"contatos",id));
carregar();
}
}
</script>

</body>
</html>
