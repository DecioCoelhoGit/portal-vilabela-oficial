<!-- ACESSIBILIDADE -->
<script>
function aplicarTemaV6(tema) {
  document.body.classList.remove("tema-claro", "tema-escuro", "alto-contraste");

  if (tema === "claro") {
    document.body.classList.add("tema-claro");
    document.documentElement.setAttribute("data-theme", "light");
  }

  if (tema === "escuro") {
    document.body.classList.add("tema-escuro");
    document.documentElement.setAttribute("data-theme", "dark");
  }

  if (tema === "contraste") {
    document.body.classList.add("alto-contraste");
    document.documentElement.setAttribute("data-theme", "contrast");
  }

  localStorage.setItem("tema", tema);
}

function setTema(tema) {
  aplicarTemaV6(tema);
}

function setFonte(tipo) {
  document.body.classList.remove("font-a", "font-a-plus", "font-a-plus-plus");

  if (tipo === "a") document.body.classList.add("font-a");
  if (tipo === "a-plus") document.body.classList.add("font-a-plus");
  if (tipo === "a-plus-plus") document.body.classList.add("font-a-plus-plus");

  localStorage.setItem("fonte", tipo);
}

function toggleAcessibilidade() {
  const painel = document.getElementById("painelAcessibilidade");
  if (painel) painel.classList.toggle("open");
}

(function iniciarPreferencias() {
  const fonteSalva = localStorage.getItem("fonte") || "a";
  const temaSalvo = localStorage.getItem("tema");

  const prefereEscuro = window.matchMedia &&
    window.matchMedia("(prefers-color-scheme: dark)").matches;

  const temaInicial = temaSalvo || (prefereEscuro ? "escuro" : "claro");

  setFonte(fonteSalva);
  aplicarTemaV6(temaInicial);
})();
</script>
  
<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbGWBKp_LlO546yM-2IXIAuvHnK9q1mlI",
  authDomain: "portal-vilabela-oficial.firebaseapp.com",
  projectId: "portal-vilabela-oficial",
  storageBucket: "portal-vilabela-oficial.firebasestorage.app",
  messagingSenderId: "908975101824",
  appId: "1:908975101824:web:f986598784403493721365"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("listaNoticias");

async function carregarNoticias(){

  try{

    const q = query(collection(db, "noticias"), orderBy("data","desc"));
    const snap = await getDocs(q);

    if(snap.empty){
      lista.innerHTML = "<p class='card'>Nenhuma notícia publicada.</p>";
      return;
    }

    lista.innerHTML = "";

    snap.forEach(doc => {
      const n = doc.data();

      const imagem = n.imagem || "imagens/portal-og-1.jpg";
      const titulo = n.titulo || "Notícia oficial";
      const texto = n.texto || "";
      const data = n.data?.toDate
        ? n.data.toDate().toLocaleDateString("pt-BR")
        : "";

      lista.innerHTML += `
        <article class="card noticia">

          <img src="${imagem}" alt="${titulo}">

          <h3>${titulo}</h3>

          <small>${data}</small>

          <p>${texto}</p>

        </article>
      `;
    });

  }catch(e){
    lista.innerHTML = "<p class='card'>Erro ao carregar notícias</p>";
  }

}

carregarNoticias();
</script>
