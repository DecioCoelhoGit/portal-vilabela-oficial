<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portal Prefeitura Vila Bela MT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;color:#222}
header{
background:#0d47a1;color:#fff;
padding:18px;text-align:center;
font-size:26px;font-weight:bold;
position:sticky;top:0;z-index:999
}
nav{
background:#1565c0;
padding:12px;text-align:center
}
nav a{
color:#fff;text-decoration:none;
margin:0 12px;font-weight:bold
}
section{padding:30px;max-width:1000px;margin:auto}
.card{
background:#fff;padding:25px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:25px
}
h2{margin-bottom:15px;color:#0d47a1}
input,textarea,button{
width:100%;padding:12px;margin-top:10px;
border:1px solid #ccc;border-radius:8px;font-size:16px
}
textarea{height:120px}
button{
background:#0d47a1;color:#fff;
border:none;font-weight:bold;cursor:pointer
}
button:hover{background:#1565c0}
#status{margin-top:15px;font-weight:bold}
.noticia{
padding:15px;border:1px solid #ddd;
border-radius:10px;margin-bottom:15px;
background:#fafafa
}
.small{font-size:13px;color:#666}
footer{
background:#0d47a1;color:#fff;
text-align:center;padding:20px;margin-top:40px
}
</style>
</head>
<body>

<header>Portal Prefeitura Vila Bela MT</header>

<nav>
<a href="#serv">Serviços</a>
<a href="#not">Notícias</a>
<a href="#trans">Transparência</a>
<a href="#cont">Contato</a>
</nav>

<section>

<div class="card" id="serv">
<h2>Serviços</h2>
<p>IPTU, protocolos, atendimento e solicitações digitais.</p>
</div>

<div class="card" id="not">
<h2>Notícias</h2>
<div id="listaNoticias">Carregando notícias...</div>
</div>

<div class="card" id="trans">
<h2>Transparência</h2>
<p>Relatórios públicos e prestação de contas.</p>
</div>

<div class="card" id="cont">
<h2>Fale Conosco</h2>

<form id="formContato">
<input id="nome" placeholder="Seu nome" required>
<input id="email" type="email" placeholder="Seu e-mail" required>
<textarea id="mensagem" placeholder="Sua mensagem" required></textarea>
<button type="submit">Enviar</button>
</form>

<div id="status"></div>

</div>

</section>

<footer>© 2026 Prefeitura Vila Bela MT</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBbGWBKp_LlO546yM-2IXIAuvHnK9q1mlI",
authDomain: "portal-vilabela-oficial.firebaseapp.com",
projectId: "portal-vilabela-oficial",
storageBucket: "portal-vilabela-oficial.firebasestorage.app",
messagingSenderId: "908975101824",
appId: "1:908975101824:web:f986598784403493721365"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CONTATO */
formContato.addEventListener("submit", async(e)=>{
e.preventDefault();
status.innerText="Enviando...";

try{
await addDoc(collection(db,"contatos"),{
nome:nome.value,
email:email.value,
mensagem:mensagem.value,
status:"novo",
data:serverTimestamp()
});
status.style.color="green";
status.innerText="Mensagem enviada com sucesso!";
formContato.reset();
}catch(err){
status.style.color="red";
status.innerText=err.message;
}
});

/* NOTÍCIAS */
async function carregarNoticias(){
const lista = document.getElementById("listaNoticias");
lista.innerHTML="";

const snap = await getDocs(collection(db,"noticias"));

if(snap.empty){
lista.innerHTML="Nenhuma notícia publicada.";
return;
}

snap.forEach((x)=>{
const d = x.data();
lista.innerHTML += `
<div class="noticia">
<h3>${d.titulo || "Sem título"}</h3>
<p style="margin-top:10px">${d.texto || ""}</p>
</div>`;
});
}

carregarNoticias();
</script>

</body>
</html>
